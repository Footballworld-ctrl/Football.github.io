<!DOCTYPE html><!-- html 해더 -->
<html><!-- 문서 시작을 나타냄. -->
<head><!-- 페이지의 설정, 정보영역 (출력되지 않음.) -->
    <title>test title</title><!-- title -->
<!--urf-8은 유니코드 8bit 형식-->
<!--meta:웹페이지에 대한 정보를 담는 태그-->
<!--영어, 한글 등 사용하려면 문자가 깨지지 않기 위해 사용 -->
<meta charset="utf-8">

</head>
<body>
    <h1>주제1<h1><!--h1~h6 순으로 주제 순서를 나타냄, 다른점은 폰트 크기정도 -->
        <h6>주제6</h6>

        <p>내용 입력</p><!-- 일반 문단을 작성할 때 사용. -->
        <p>내용<br>2</p><!-- 강제 줄바꿈. /n -->
        <pre>안녕 하세요 <!-- 편집기 그대로를 출력 -->
            응 ? 123 13
        </pre>
        <hr><!-- 수평선을 나타냄. -->
<!--긴 인용문을 표시하는 태그, 들어써서 표시됨 -->
<blockquote>인용문 태그</blockquote>
<!-- 문자태그 -->
 <i>흘림체</i><!-- 흘림체 -->
 <b>강조체</b><!--강조체 bold -->
 <code>프로그램 코드체</code><!-- 프로그램 코드체 -->
 <strong>강조체</strong><!-- 프로그램 코드체 -->
 <em>강조체</em> <!-- 흘림 강조체 -->
 <p>윗첨자<sup>up</sup></p><!-- 윗첨자 수직계산 활용 -->
 <p>아랫첨자<sub>down</sub></p><!-- 아래첨자 수직계산 활용 -->
 
 <table border="1"><!--테이블 생성 / 선두께 1 -->
    <caption>주제</caption><!-- 표 제목 -->
    <tr><!-- 행 생성 -->
        <th>1</th><!-- 표의 해더로 강조체 -->
        <th>2</th>
        <th>3</th>
        <th>4</th>
    </tr>
    <tr>
        <td rowspan="2">내용1</td>
        <td>내용2</td><!--표의 칸 생성 -->
        <td>내용3</td><!-- rowspan:아래로 1칸더 차지하겠다. -->
        <td>내용4</td>
    </tr>
        <td>ㄴㅇ1</td><!-- colspan:옆으로 1칸더 차지하겠다. -->
        <td colspan="'2">ㄴㅇ3</td>
    </tr>
</table>

<!-- 링크를 걸 수 있는 태그 -->
 <a href=""https://naver.com" target="_blank"></a> <!--_blank -->
 <a href="https://naver.com" target="_self"></a> <!--_self 자신 페이지 교체-->

 <!-- 이미지 경로를 지정하여 사진을 띄울 수 있음, -->
<!-- src:경로/ alt:이미지 대체 텍스트 -->
<!-- 싱데경로는 지금 파일 기준으로 위치를 잡아야 함. -->
<!-- width:좌우 크기 / height:상하 크기 -->
 <img src="../img/logo.png" alt="aa" width="100" height="100">
 <!-- 절대경로는 맨 처음위치부터 이미지까지 전체를 잡아야 함. -->
<img src="C\/Users\user\Desktop\새 폴더\img\logo.png" alt="bb" width="100" height





</html>
